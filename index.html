<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FLUX"/>
<meta name="theme-color" content="#070310"/>
<meta name="description" content="FLUX — Financial Planner & Bill Optimization System"/>
<title>FLUX — Financial Planner</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@500;600;700;800;900&display=swap" rel="stylesheet"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
/* ── Reset & Base ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;height:-webkit-fill-available;background:#070310;overflow:hidden;}
body{
  height:100vh; height:100dvh; height:-webkit-fill-available;
  overflow:hidden; color:#eae3ff; font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased; overscroll-behavior:none; background:#070310;
}
#root{height:100%;overflow:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#3d2563;border-radius:2px;}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input,select,textarea{ -webkit-appearance:none; -moz-appearance:none; border-radius:0; }
*{-webkit-tap-highlight-color:transparent;}
button{cursor:pointer;}

/* Global Animations & Utilities */
@keyframes fadeUp  { from{opacity:0;transform:translateY(10px);}  to{opacity:1;transform:translateY(0);} }
@keyframes slideUp { from{opacity:0;transform:translateY(28px);}  to{opacity:1;transform:translateY(0);} }
.fade-up  { animation: fadeUp  .28s ease forwards; }
.slide-up { animation: slideUp .32s cubic-bezier(.16,1,.3,1) forwards; }

.app {
  max-width: 100%; height: 100vh; height: 100dvh; margin: 0 auto; background: #070310;
  background-image: radial-gradient(circle at 15% 0%, rgba(168,85,247,0.12) 0%, transparent 45%), radial-gradient(circle at 100% 30%, rgba(0,229,255,0.08) 0%, transparent 50%), radial-gradient(circle at 0% 100%, rgba(255,46,224,0.07) 0%, transparent 45%);
  display: flex; flex-direction: column; position: relative; overflow: hidden;
}
.ph { padding: 18px 20px 16px; border-bottom: 1px solid #2a1a45; position: relative; overflow: hidden; }
.ph-title { font-family:'Orbitron',system-ui,sans-serif; font-size:22px; font-weight:800; color:#eae3ff; letter-spacing:.3px; line-height:1.2; text-shadow: 0 0 18px rgba(0,255,200,0.35); }
.ph-sub   { font-family:'Space Grotesk',system-ui,sans-serif; font-size:9px; font-weight:500; color:#6b5a8c; letter-spacing:.14em; text-transform:uppercase; margin-top:4px; }
.scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 18px 16px 124px; }
.top-bar { position: relative; z-index: 250; display: flex; align-items: center; justify-content: space-between; padding: calc(env(safe-area-inset-top) + 16px) 16px 14px; background: rgba(7,3,16,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #2a1a45; flex-shrink: 0; }
.top-bar-word { font-family: 'Orbitron',sans-serif; font-size: 17px; font-weight: 800; color: #eae3ff; letter-spacing: 1px; display: flex; align-items: center; gap: 7px; text-shadow: 0 0 14px rgba(0,255,200,0.4); }
.top-bar-word .bolt { color: #00ffc8; filter: drop-shadow(0 0 6px #00ffc8); font-size: 16px; }

/* Bottom Dock */
.dock-wrap { position: fixed; left: 0; right: 0; bottom: 0; z-index: 190; display: flex; justify-content: center; padding: 0 16px calc(18px + env(safe-area-inset-bottom)); pointer-events: none; }
.dock { pointer-events: auto; display: flex; align-items: center; gap: 4px; background: rgba(18,10,34,0.82); border: 1px solid #3d2563; border-radius: 30px; padding: 7px 8px; box-shadow: 0 8px 32px rgba(0,0,0,.6); backdrop-filter: blur(18px); }
.dock-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; width: 52px; height: 46px; border-radius: 22px; border: none; background: transparent; cursor: pointer; flex-shrink: 0; transition: all .2s; }
.dock-btn-icon { font-size: 17px; line-height: 1; filter: drop-shadow(0 0 4px rgba(0,255,200,0.5)); }
.dock-btn-label { font-family:'Space Grotesk',sans-serif; font-size: 7px; font-weight:700; letter-spacing:.04em; color:#6b5a8c; text-transform:uppercase; }
.dock-btn.home { background: linear-gradient(145deg, #00ffc8, #00b8e5); width: 54px; height: 54px; border-radius: 50%; margin: -4px 2px 0; box-shadow: 0 0 0 4px rgba(7,3,16,1), 0 0 18px rgba(0,255,200,0.65); }
.dock-btn.home .dock-btn-icon { color: #070310; font-size: 20px; filter: none; }
.dock-btn.menu { background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.3); }
.dock-btn.menu .dock-btn-icon { color: #a855f7; filter: drop-shadow(0 0 6px #a855f7); }

/* Navigation Rail */
.nav-backdrop { position: fixed; inset: 0; z-index: 198; background: rgba(5,2,12,.7); backdrop-filter: blur(4px); }
.nav-rail { position: fixed; left: 0; right: 0; bottom: 0; z-index: 199; max-height: 72vh; background: linear-gradient(165deg, #150a28, #0c0617); border: 1px solid #3d2563; border-bottom: none; border-radius: 26px 26px 0 0; display: flex; flex-direction: column; padding: 14px 0 calc(16px + env(safe-area-inset-bottom)); overflow-y: auto; animation: slideUp .26s forwards; }
.nav-rail-handle { width: 36px; height: 4px; border-radius: 3px; background: #3d2563; margin: 0 auto 14px; }
.nav-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; padding: 4px 14px 6px; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 4px; cursor: pointer; border: 1px solid transparent; background: none; width: 100%; text-align: center; border-radius: 16px; }
.nav-item.on { border-color: rgba(0,255,200,0.4); background: rgba(0,255,200,0.08); }
.nav-item-icon { font-size: 19px; line-height: 1; flex-shrink: 0; filter: drop-shadow(0 0 5px rgba(168,85,247,0.5)); }
.nav-item-label { font-family: 'Space Grotesk',sans-serif; font-size: 9px; font-weight: 600; color: #9d8bc0; line-height: 1.3; }

/* UI Elements */
.card { background:#120a22; border:1px solid #2a1a45; border-radius:14px; padding:16px; margin-bottom:10px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: 10px; font-family:'Space Grotesk',sans-serif; font-size:11px; letter-spacing:.06em; font-weight:700; cursor: pointer; border: 1px solid transparent; text-transform: uppercase; }
.btn-green { background:linear-gradient(135deg,#00ffc8,#00b8e5); color:#070310; box-shadow:0 0 16px rgba(0,255,200,.4); }
.btn-ghost { background:transparent; color:#eae3ff; border-color:#3d2563; }
.btn-red { background:transparent; color:#ff3864; border-color:#ff3864; }
.btn-yellow { background:transparent; color:#f9f002; border-color:#f9f002; }
.btn-sm { padding:7px 12px; font-size:10px; } .btn-full { width: 100%; }

.fl { margin-bottom: 14px; }
.fl label { display: block; font-family: 'Space Grotesk',sans-serif; font-size: 9px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color: #6b5a8c; margin-bottom: 6px; }
.fi { width: 100%; padding: 11px 13px; background: #1a1030; border: 1px solid #2a1a45; border-radius: 10px; font-family: 'Inter',sans-serif; font-size: 14px; color: #eae3ff; outline: none; }
.fi:focus { border-color: #00ffc8; }

.badge { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:20px; font-family:'Space Grotesk',sans-serif; font-size:9px; font-weight:600; letter-spacing:.04em; }
.badge-critical { background:rgba(255,56,100,.14); color:#ff3864; border:1px solid rgba(255,56,100,.35); }
.badge-high { background:rgba(249,240,2,.10); color:#f9f002; border:1px solid rgba(249,240,2,.25); }
.badge-medium { background:rgba(0,229,255,.10); color:#00e5ff; border:1px solid rgba(0,229,255,.25); }
.badge-low { background:rgba(0,255,200,.10); color:#00ffc8; border:1px solid rgba(0,255,200,.25); }

.pt { height:4px; background:#2a1a45; border-radius:2px; overflow:hidden; }
.pf { height:100%; border-radius:2px; transition:width .5s ease; }

.overlay { position: fixed; inset: 0; background: rgba(5,2,12,.86); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px 16px; backdrop-filter: blur(10px); }
.sheet { background: linear-gradient(165deg, #150a28, #0c0617); border: 1px solid #3d2563; border-radius: 18px; padding: 20px 18px 24px; width: 100%; max-width: 400px; max-height: 88vh; overflow-y: auto; display: flex; flex-direction: column; }

.bill-row, .exp-row { display:flex; align-items:center; padding:13px 14px; border-radius:12px; border:1px solid #2a1a45; background:#120a22; margin-bottom:7px; gap:11px; }
.stat-box { background:#120a22; border:1px solid #2a1a45; border-radius:12px; padding:13px 14px; }
.neon-num { font-family:'Orbitron',sans-serif; font-weight:700; letter-spacing:.2px; }
.flux-label { font-family:'Space Grotesk',sans-serif; font-size:9px; font-weight:600; letter-spacing:.15em; text-transform:uppercase; color:#00ffc8; margin-bottom:6px; display:block; }
.flux-slider { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: #2a1a45; outline: none; margin: 4px 0; }
.flux-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg,#00ffc8,#ff2ee0); border: 2px solid #070310; box-shadow: 0 0 12px rgba(0,255,200,.8); margin-top: -6px; }

</style>
</head>
<body>
<div id="root"></div>

<script>
const { useState, useMemo, useEffect, useCallback, useRef } = React;

// ═══════════════════════════════════════════════════════
// CONSTANTS & UTILS
// ═══════════════════════════════════════════════════════
const N = { void:"#070310", surface:"#120a22", raised:"#1a1030", border:"#2a1a45", dim:"#6b5a8c", ghost:"#9d8bc0", text:"#eae3ff", green:"#00ffc8", pink:"#ff2ee0", blue:"#00e5ff", red:"#ff3864", yellow:"#f9f002" };
const RISK = { critical:{color:N.red,icon:"⚡",label:"Critical"}, high:{color:N.yellow,icon:"◈",label:"High"}, medium:{color:N.blue,icon:"◎",label:"Medium"}, low:{color:N.green,icon:"○",label:"Low"} };

// Updated Categories based on App Adjustments
const BILL_CATS = ["Rent / Mortgage","Utilities","Electric","Water","Gas Utility","Sewer / Trash","Internet","Phone","Insurance","Auto Loan","Personal Loan","Credit Cards","Subscription Services","Child Support","Storage Unit","HOA Fees","Medical Payment Plans","Custom Category"];
const EXP_CATS = ["Transportation","Food","Children & Family","Personal","Household","Health","Pets","Miscellaneous","Juana's Allowance", "Custom Category"];
const DEBT_CATS = ["Credit Card","Student Loan","Auto Loan","Personal Loan","Medical Debt","Other"];
const FREQ_OPTS = ["monthly","semi-monthly","weekly","biweekly","quarterly","annually","one-time"];

const CAT_ICONS = {
  "Rent / Mortgage":"🏠", Utilities:"⚡", Electric:"💡", Water:"🚰", "Gas Utility":"🔥", "Sewer / Trash":"🗑️",
  Insurance:"🛡", "Auto Loan":"🚗", Health:"⚕️", Food:"🛒", "Subscription Services":"📱", Phone:"📞", Internet:"📡",
  "Credit Cards":"💳", "Personal Loan":"💼", "Medical Payment Plans":"⚕️", "Child Support":"👶", "Storage Unit":"📦",
  "Children & Family": "🧸", "Personal": "✂️", "Household": "🏡", "Pets": "🐾", "Miscellaneous": "📎", "Transportation": "🚗",
  "Juana's Allowance": "💖", "Custom Category": "✨"
};

const fmt = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(n||0);
const uid = () => Math.random().toString(36).slice(2,9);
const today$ = () => new Date().toISOString().split("T")[0];

function toMonthly(amt, freq) {
  if(!amt) return 0;
  switch(freq){
    case "weekly": return amt * 52 / 12;
    case "biweekly": return amt * 26 / 12;
    case "semi-monthly": return amt * 2;
    case "quarterly": return amt / 3;
    case "annually": return amt / 12;
    case "one-time": return 0;
    default: return amt;
  }
}

function lsGet(k,fb){try{const v=localStorage.getItem("flux_"+k);return v?JSON.parse(v):fb;}catch(e){return fb;}}
function lsSet(k,v){try{localStorage.setItem("flux_"+k,JSON.stringify(v));}catch(e){}}

// ═══════════════════════════════════════════════════════
// SHARED COMPONENTS
// ═══════════════════════════════════════════════════════
const SB = ({label,value,color,sub}) => (
  <div className="stat-box" style={{borderColor:color+"22"}}>
    <p style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:N.dim,marginBottom:5}}>{label}</p>
    <p className="neon-num" style={{fontSize:22,color,lineHeight:1}}>{value}</p>
    {sub && <p style={{fontSize:10,color:N.ghost,marginTop:4}}>{sub}</p>}
  </div>
);
const RB = ({risk}) => <span className={`badge badge-${risk}`}>{RISK[risk]?.icon} {RISK[risk]?.label}</span>;
const PB = ({pct,color}) => <div className="pt"><div className="pf" style={{width:`${Math.min(100,Math.max(0,pct))}%`,background:color,boxShadow:`0 0 6px ${color}`}}/></div>;
const Modal = ({onClose,title,children}) => (
  <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="sheet">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <h2 style={{fontFamily:"'Orbitron',sans-serif",fontSize:17,fontWeight:800}}>{title}</h2>
        <button onClick={onClose} style={{background:"rgba(168,85,247,0.1)",border:"1px solid #3d2563",borderRadius:8,color:"#9d8bc0",width:34,height:34}}>&times;</button>
      </div>
      <div style={{overflowY:"auto",flex:1}}>{children}</div>
    </div>
  </div>
);

// ═══════════════════════════════════════════════════════
// HOME SCREEN (Includes Daily Allowance)
// ═══════════════════════════════════════════════════════
function HomeScreen({bills, expenses, incomeData, savings, onNav}) {
  const today = new Date();
  const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
  const daysRemaining = Math.max(1, daysInMonth - today.getDate() + 1);

  // Financial Engine
  const monthlyIncome = incomeData.reduce((s,src)=>s+toMonthly(src.amount,src.frequency),0);
  const monthlyBills = bills.reduce((s,b)=>s+toMonthly(b.amount,b.frequency),0);
  const savingsTarget = savings.reduce((s,g)=>s+(g.monthlyContrib||0),0);
  
  const monthKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const spentThisMonth = expenses.filter(e=>e.date.startsWith(monthKey)).reduce((s,e)=>s+e.amount, 0);

  const discretionaryLeft = Math.max(0, monthlyIncome - monthlyBills - savingsTarget - spentThisMonth);
  const dailyAllowance = discretionaryLeft / daysRemaining;

  return (
    <div className="fade-up">
      <div className="ph">
        <span className="flux-label">Financial OS</span>
        <h1 className="ph-title">FLUX<span style={{color:N.green}}>.</span></h1>
      </div>
      <div className="scroll">
        
        {/* Daily Allowance Widget */}
        <div style={{background:N.surface, border:`1px solid ${N.green}`, borderRadius:14, padding:20, marginBottom:16, textAlign:"center"}}>
          <p style={{fontFamily:"'Space Grotesk',sans-serif", fontSize:10, color:N.green, textTransform:"uppercase", letterSpacing:1}}>Safe to Spend Today</p>
          <p className="neon-num" style={{fontSize:42, color:N.green, margin:"10px 0"}}>{fmt(dailyAllowance)}</p>
          <p style={{fontSize:11, color:N.ghost}}>{fmt(discretionaryLeft)} remaining discretionary for the month</p>
        </div>

        <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:18}}>
          <SB label="Monthly Bills" value={fmt(monthlyBills)} color={N.red} sub={`${bills.length} active bills`}/>
          <SB label="Spent MTD" value={fmt(spentThisMonth)} color={N.blue} sub="across categories"/>
        </div>

        <div style={{background:"linear-gradient(135deg,rgba(0,255,136,0.08) 0%,rgba(0,207,255,0.05) 100%)",border:"1px solid rgba(0,255,136,0.3)",borderRadius:14,padding:18,marginBottom:16,cursor:"pointer"}} onClick={()=>onNav('flux')}>
          <span className="flux-label">Core Decision Engine</span>
          <p style={{fontFamily:"'Inter',sans-serif",fontSize:22,fontWeight:800,color:N.green,marginBottom:6}}>Flux Mode ⚡</p>
          <p style={{fontSize:12,color:N.ghost}}>Prioritize bills around your paycheck dates. Ensure essential services stay on.</p>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// BILLS SCREEN (Advanced Status & Catch-up Logic)
// ═══════════════════════════════════════════════════════
function BillsScreen({bills, setBills}) {
  const [detail, setDetail] = useState(null);
  const [addOpen, setAddOpen] = useState(false);
  const [editData, setEditData] = useState(null);

  const [form, setForm] = useState({
    name:"", amount:"", frequency:"monthly", semiDay1:"1", semiDay2:"15", dueDay:"1", category:"Rent / Mortgage",
    risk:"medium", gracePeriod:"", lateFee:"", status:"Current", pastDueAmount:"", lastPaidDate:""
  });

  const saveBill = () => {
    if(!form.name || !form.amount) return;
    const b = {
      ...form, 
      id: editData?.id || uid(), 
      amount: parseFloat(form.amount), 
      lateFee: parseFloat(form.lateFee)||0,
      pastDueAmount: parseFloat(form.pastDueAmount)||0
    };
    if(editData) setBills(p=>p.map(x=>x.id===b.id?b:x));
    else setBills(p=>[...p,b]);
    setAddOpen(false); setEditData(null);
  };

  const openEdit = (b) => {
    setForm({...b, amount:String(b.amount), lateFee:String(b.lateFee||""), pastDueAmount:String(b.pastDueAmount||"")});
    setEditData(b); setAddOpen(true); setDetail(null);
  };

  return (
    <div className="fade-up">
      <div className="ph">
        <div style={{display:"flex",justifyContent:"space-between"}}>
          <div><h1 className="ph-title">Bills</h1><p className="ph-sub">{bills.length} Obligations</p></div>
          <button className="btn btn-pink btn-sm" onClick={()=>{setEditData(null);setAddOpen(true);}}>+ Add</button>
        </div>
      </div>
      <div className="scroll">
        {bills.map(b=>(
          <div key={b.id} className="bill-row" onClick={()=>setDetail(b)}>
            <div style={{width:34,height:34,borderRadius:9,background:`${RISK[b.risk].color}14`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{CAT_ICONS[b.category]||"📄"}</div>
            <div style={{flex:1}}>
              <p style={{fontWeight:600,fontSize:13}}>{b.name}</p>
              <p style={{fontSize:10,color:b.status==="Past Due"?N.red:N.dim}}>
                {b.frequency==="semi-monthly" ? `Days ${b.semiDay1} & ${b.semiDay2}` : `Day ${b.dueDay}`} · {b.status}
              </p>
            </div>
            <div style={{textAlign:"right"}}>
              <p className="neon-num" style={{fontSize:16,color:RISK[b.risk].color}}>{fmt(b.amount)}</p>
              <RB risk={b.risk}/>
            </div>
          </div>
        ))}
      </div>

      {(addOpen || editData) && (
        <Modal onClose={()=>{setAddOpen(false);setEditData(null);}} title={editData?"Edit Bill":"Add Bill"}>
          <div className="fl"><label>Name</label><input className="fi" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div className="fl"><label>Standard Amount</label><input className="fi" type="number" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})}/></div>
            <div className="fl">
              <label>Frequency</label>
              <select className="fi" value={form.frequency} onChange={e=>setForm({...form,frequency:e.target.value})}>
                {FREQ_OPTS.map(f=><option key={f} value={f}>{FREQ_LABELS[f]||f}</option>)}
              </select>
            </div>
          </div>
          {form.frequency==="semi-monthly" ? (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div className="fl"><label>First Date (1-31)</label><input className="fi" type="number" value={form.semiDay1} onChange={e=>setForm({...form,semiDay1:e.target.value})}/></div>
              <div className="fl"><label>Second Date (1-31)</label><input className="fi" type="number" value={form.semiDay2} onChange={e=>setForm({...form,semiDay2:e.target.value})}/></div>
            </div>
          ) : (
            <div className="fl"><label>Due Day (1-31)</label><input className="fi" type="number" value={form.dueDay} onChange={e=>setForm({...form,dueDay:e.target.value})}/></div>
          )}
          
          <div className="fl"><label>Category</label><select className="fi" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>{BILL_CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div className="fl"><label>Risk Level</label><select className="fi" value={form.risk} onChange={e=>setForm({...form,risk:e.target.value})}>{Object.keys(RISK).map(k=><option key={k} value={k}>{RISK[k].label}</option>)}</select></div>
          
          <div style={{padding:"12px",background:N.raised,border:`1px solid ${N.borderHi}`,borderRadius:8,marginBottom:14}}>
            <p style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:10,color:N.yellow,marginBottom:10,textTransform:"uppercase"}}>Account Status</p>

                <p style={{fontSize:10,color:N.ghost,marginTop:4}}>Includes {fmt(detail.pastDueAmount)} past due + {fmt(detail.lateFee)} in fees.</p>
              </div>
            ) : (

                <p className="neon-num" style={{fontSize:24,color:N.green}}>{fmt(detail.amount)}</p>
              </div>
            )}
            
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,borderTop:`1px solid ${N.borderHi}`,paddingTop:12}}>

              <div><p style={{fontSize:9,color:N.dim,textTransform:"uppercase"}}>Risk</p><p style={{fontSize:13}}>{RISK[detail.risk].label}</p></div>
            </div>

          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

            <button className="btn btn-yellow btn-sm" style={{flex:1}} onClick={()=>openEdit(detail)}>✏ Edit</button>

  );
}

// PROJECTIONS SCREEN (Replaces Forecast)
// ═══════════════════════════════════════════════════════
function ProjectionsScreen({bills, expenses, incomeData, savings}) {
  const [incomeSlider, setIncomeSlider] = useState(100);
  
  const baseMonthlyIncome = incomeData.reduce((s,src)=>s+toMonthly(src.amount,src.frequency),0);
  const adjustedIncome = baseMonthlyIncome * (incomeSlider/100);
  
  const monthlyBills = bills.reduce((s,b)=>s+toMonthly(b.amount,b.frequency),0);
  const monthlySavings = savings.reduce((s,g)=>s+(g.monthlyContrib||0),0);
  
  // Quick projection math
  const leftover = adjustedIncome - monthlyBills - monthlySavings;

  return (
    <div className="fade-up">
      <div className="ph">
        <h1 className="ph-title">Projections</h1>
        <p className="ph-sub">Income, Expenses & Savings Outlook</p>
      </div>
      <div className="scroll">
        
        <div style={{background:N.surface,border:`1px solid ${N.border}`,borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <p style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:11,color:N.blue,textTransform:"uppercase"}}>What-If Income Adjuster</p>
            <p className="neon-num" style={{color:incomeSlider>100?N.green:incomeSlider<100?N.red:N.text}}>{incomeSlider}%</p>
          </div>
          <input type="range" className="flux-slider" min="50" max="200" step="5" value={incomeSlider} onChange={e=>setIncomeSlider(e.target.value)}/>
          <p style={{fontSize:10,color:N.dim,marginTop:8,textAlign:"center"}}>Projecting {fmt(adjustedIncome)} / month</p>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          <SB label="Projected Income" value={fmt(adjustedIncome)} color={N.green}/>
          <SB label="Required Bills" value={fmt(monthlyBills)} color={N.red}/>
          <SB label="Planned Savings" value={fmt(monthlySavings)} color={N.blue}/>
          <SB label="Est. Leftover" value={fmt(leftover)} color={leftover>=0?N.yellow:N.red} sub="Discretionary cache"/>
        </div>

        <div style={{padding:16,background:"rgba(0,207,255,0.05)",border:"1px solid rgba(0,207,255,0.2)",borderRadius:12}}>
          <p style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:10,color:N.blue,textTransform:"uppercase",marginBottom:8}}>Projection Insight</p>
          <p style={{fontSize:12,color:N.ghost,lineHeight:1.6}}>
            {leftover >= 0 
              ? `At ${incomeSlider}% income, you cover all bills and savings goals with ${fmt(leftover)} left for daily living expenses.`
              : `At ${incomeSlider}% income, you are operating at a deficit of ${fmt(Math.abs(leftover))}. You will need to reduce savings goals or cut optional bills.`}
          </p>
        </div>
      </div>
    </div>
  );
}

// ─── FLUX ENGINE SCREEN (Updates for paychecks) ───────────────────────────────
function FluxScreen({bills, incomeData}) {
  const [cash, setCash] = useState("");
  const [result, setResult] = useState(null);

  const run = () => {
    const c = parseFloat(cash); if(!c) return;
    // Flux identifies critical vs optional based on available cash
    const scored = bills.map(b => ({
      ...b, 
      priorityScore: b.risk==="critical"?100:b.risk==="high"?70:b.risk==="medium"?40:10,
      totalCatchup: b.status==="Past Due" ? b.amount + (b.lateFee||0) + (b.pastDueAmount||0) : b.amount
    })).sort((a,b)=>b.priorityScore - a.priorityScore);
    
    let remaining = c;
    const plan = { paid:[], deferred:[], short:false };
    
    scored.forEach(b => {
      if(remaining >= b.totalCatchup) {
        plan.paid.push(b);
        remaining -= b.totalCatchup;
      } else {
        plan.deferred.push(b);
        if(b.risk==="critical" || b.risk==="high") plan.short = true;
      }
    });
    
    setResult({...plan, leftover:remaining});
  };

  return (
    <div className="fade-up">
      <div className="ph" style={{background:N.void}}>
        <h1 className="ph-title" style={{color:N.green}}>Flux Mode ⚡</h1>
        <p style={{fontSize:12,color:N.dim,marginTop:6}}>Enter paycheck amount to generate payment breakdown.</p>
        <div style={{display:"flex",gap:10,marginTop:12}}>
          <input className="fi" type="number" placeholder="$ Available Cash" value={cash} onChange={e=>setCash(e.target.value)}/>
          <button className="btn btn-green" onClick={run}>Run</button>
        </div>
      </div>
      
      <div className="scroll">
        {result && (
          <>
            <div style={{background:result.short?N.raised:"rgba(0,255,136,0.05)", padding:16, borderRadius:12, border:`1px solid ${result.short?N.red:N.green}`, marginBottom:16}}>
              <p style={{fontSize:12,color:result.short?N.red:N.green,fontWeight:700}}>
                {result.short ? "⚠ Insufficient funds to cover all critical bills." : "✓ All critical bills covered."}
              </p>
              <p style={{fontSize:24,color:N.white,marginTop:4}}>{fmt(result.leftover)} <span style={{fontSize:12,color:N.dim}}>remaining float</span></p>
            </div>

            <p style={{fontSize:10,color:N.dim,textTransform:"uppercase",marginBottom:8}}>To Pay Now ({result.paid.length})</p>
            {result.paid.map(b=>(
              <div key={b.id} style={{background:N.surface,borderLeft:`3px solid ${N.green}`,padding:12,borderRadius:8,marginBottom:8,display:"flex",justifyContent:"space-between"}}>
                <div><p style={{fontSize:13,fontWeight:600}}>{b.name}</p><p style={{fontSize:10,color:N.dim}}>{b.status==="Past Due"?"Includes Catch-up":b.frequency}</p></div>
                <p className="neon-num" style={{color:N.green}}>{fmt(b.totalCatchup)}</p>
              </div>
            ))}

            <p style={{fontSize:10,color:N.dim,textTransform:"uppercase",marginTop:16,marginBottom:8}}>Deferred / Optional ({result.deferred.length})</p>
            {result.deferred.map(b=>(
              <div key={b.id} style={{background:N.surface,borderLeft:`3px solid ${b.risk==="critical"?N.red:N.ghost}`,padding:12,borderRadius:8,marginBottom:8,display:"flex",justifyContent:"space-between",opacity:0.6}}>
                <div><p style={{fontSize:13,fontWeight:600}}>{b.name}</p><p style={{fontSize:10,color:N.red}}>{b.risk==="critical"?"CRITICAL SHORTFALL":"Low Priority"}</p></div>
                <p className="neon-num" style={{color:N.ghost}}>{fmt(b.totalCatchup)}</p>
              </div>
            ))}
          </>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP COMPONENT ───────────────────────────────────────────────────────

  const [navOpen, setNavOpen] = useState(false);
  const [navHiding, setNavHiding] = useState(false);

  // State Persistence
  const [bills, setBills] = useState(()=>lsGet("bills", INIT_BILLS));
  const [expenses, setExpenses] = useState(()=>lsGet("expenses", INIT_EXPENSES));
  const [incomeData, setIncomeData] = useState(()=>lsGet("income", INIT_INCOME.sources));
  const [savings, setSavings] = useState(()=>lsGet("savings", INIT_SAVINGS));
  const [debts, setDebts] = useState(()=>lsGet("debts", INIT_DEBTS));

  // Sync to LS
  useEffect(()=>lsSet("bills", bills), [bills]);
  useEffect(()=>lsSet("expenses", expenses), [expenses]);
  useEffect(()=>lsSet("income", incomeData), [incomeData]);
  useEffect(()=>lsSet("savings", savings), [savings]);
  useEffect(()=>lsSet("debts", debts), [debts]);

  const closeNav = () => { setNavHiding(true); setTimeout(()=>{setNavOpen(false); setNavHiding(false);}, 250); };
  const nav = (s) => { setScreen(s); closeNav(); };

  const SCREENS = {

    flux: <FluxScreen bills={bills} incomeData={incomeData}/>,
    projections: <ProjectionsScreen bills={bills} expenses={expenses} incomeData={incomeData} savings={savings}/>,
    expenses: <ExpensesScreen expenses={expenses} setExpenses={setExpenses}/>,
    debt: <DebtScreen debts={debts} setDebts={setDebts}/>,
    savings: <SavingsScreen savings={savings} setSavings={setSavings}/>,
    income: <IncomeScreen incomeData={{sources:incomeData}} setIncomeData={d=>setIncomeData(d.sources)}/>

  const ALL_SCREENS = [
    { id:'home', icon:'🏠', label:'Home' },
    { id:'flux', icon:'⚡', label:'Flux Mode' },
    { id:'bills', icon:'📋', label:'Bills' },
    { id:'projections', icon:'📈', label:'Projections' },
    { id:'expenses', icon:'📒', label:'Expenses' },
    { id:'income', icon:'💵', label:'Income' },
    { id:'debt', icon:'💳', label:'Debt' },
    { id:'savings', icon:'🌱', label:'Savings' }
  ];

  return (
    <>
      <style>{CSS}</style>
      <div className="app">
        <div className="top-bar">
          <span className="top-bar-word"><span className="bolt">⚡</span>FLUX</span>
        </div>

        <div style={{flex:1, overflowY:"auto", WebkitOverflowScrolling:"touch"}}>
          {SCREENS[screen]}
        </div>

        {/* Floating Dock */}
        <div className="dock-wrap">
          <div className="dock">
            <button className="dock-btn" onClick={()=>nav('flux')}>
              <span className="dock-btn-icon">⚡</span><span className="dock-btn-label">Flux</span>
            </button>
            <button className="dock-btn" onClick={()=>nav('bills')}>
              <span className="dock-btn-icon">📋</span><span className="dock-btn-label">Bills</span>
            </button>
            <button className="dock-btn home" onClick={()=>nav('home')}>
              <span className="dock-btn-icon" style={{color:N.void}}>🏠</span>
            </button>
            <button className="dock-btn" onClick={()=>nav('projections')}>
              <span className="dock-btn-icon">📈</span><span className="dock-btn-label">Forecast</span>
            </button>
            <button className={`dock-btn menu${navOpen?" on":""}`} onClick={()=>navOpen?closeNav():setNavOpen(true)}>
              <span className="dock-btn-icon">☰</span><span className="dock-btn-label">Menu</span>
            </button>
          </div>
        </div>

        {navOpen && <div className="nav-backdrop" onClick={closeNav}/>}
        {navOpen && (
          <div className={`nav-rail${navHiding?" hiding":""}`}>
            <div className="nav-rail-handle"/>
            <p className="nav-rail-title">FLUX · System Map</p>
            <div className="nav-grid">

                <button key={s.id} className={`nav-item${screen===s.id?" on":""}`} onClick={()=>nav(s.id)}>

}
